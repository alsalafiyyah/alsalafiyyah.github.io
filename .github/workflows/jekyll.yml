name: Deploy Jekyll site to Pages

on:
  push:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true # Changed to true: kills old builds if you push twice quickly

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1 # Only download the latest commit (huge for 1,000+ files)

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
          cache-version: 1 

      # NEW: Cache the Jekyll Metadata (.jekyll-cache)
      # This allows Jekyll to remember info about your 983 posts between runs
      - name: Jekyll Cache
        uses: actions/cache@v4
        with:
          path: .jekyll-cache
          key: ${{ runner.os }}-jekyll-${{ hashFiles('**/Gemfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-jekyll-

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build with Jekyll
        run: bundle exec jekyll build --baseurl "${{ steps.pages.outputs.base_path }}" --profile
        env:
          JEKYLL_ENV: production
          # Optimization for large sites
          RUBY_GC_HEAP_FREE_SLOTS: 600000
          RUBY_GC_MALLOC_LIMIT: 40000000
          RUBY_GC_MALLOC_LIMIT_MAX: 160000000
      - name: Minify HTML
        uses: actions/languages-tools/html-minifier@v1
        with:
          directory: '_site'
          rules: --collapse-whitespace --remove-comments --minify-js true --minify-css true
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4