---
layout: page
title: Categories
active: category
summary: Browse all available fatwas by categories.
---
<div class="d-flex flex-wrap gap-2 py-1 justify-content-start"> 
{% for category in site.categories %}	
<a href="{{ site.baseurl }}/category/{{ category[0] }}" class="text-decoration-none">
 <span class="badge d-flex align-items-center p-1 pe-2 text-light-emphasis bg-light-subtle border border-dark-subtle rounded-pill"> 
  <span class="px-1">{{ category | first | strip_html | capitalize }}</span> 
  <span class="vr mx-2"></span> 
  <span class="badge text-bg-danger rounded-pill">{{ category[1].size }}</span>
 </span>
</a>
{% endfor %}
</div>
