---
layout: tailwind
title: Search
active: search
permalink: /search/
---

<header class="border-b-4 border-black dark:border-white pb-12 mb-12">
    <div class="flex items-center gap-4 text-[10px] font-black uppercase tracking-[0.3em] text-gray-400 mb-4">
        <span>Query Results</span>
        <span class="text-black dark:text-white">/</span>
        <span id="result-count" class="tabular-nums">00</span>
    </div>
    <h1 class="text-3xl md:text-[3vw] font-black uppercase tracking-tighter serif leading-none">
        “<span id="search-term-display" class="italic">...</span>”
    </h1>
</header>

<div id="searchResults" class="space-y-0"></div>

<nav id="paginationNav" class="flex items-center justify-between border-t-4 border-black dark:border-white pt-12 mt-12 mb-24"></nav>

<div id="allPosts" style="display:none;">
  {% for post in site.posts %}
  <div class="post-template"
       data-title="{{ post.title | escape }}"
       data-content="{{ post.content | strip_html | normalize_whitespace | escape }}"
       data-url="{{ post.url | relative_url }}"
       data-hijri="{{ post.hijri }}">
  </div>
  {% endfor %}
</div>

<script>
document.addEventListener("DOMContentLoaded", function () {
    const allTemplates = Array.from(document.querySelectorAll("#allPosts .post-template"));
    const container = document.getElementById("searchResults");
    const paginationNav = document.getElementById("paginationNav");
    const termDisplay = document.getElementById("search-term-display");
    const countDisplay = document.getElementById("result-count");

    const pageSize = 10; 

    function getQueryParam(name) {
        const params = new URLSearchParams(window.location.search);
        return params.get(name) || "";
    }

    function getUrlPage() {
        const params = new URLSearchParams(window.location.search);
        return parseInt(params.get('page')) || 1;
    }

    function highlightText(text, query) {
        if (!query) return text;
        const regex = new RegExp(`(${query})`, "gi");
        // Using a custom class for the highlight to match theme
        return text.replace(regex, `<mark class="bg-black text-white dark:bg-white dark:text-black p-0.5">$1</mark>`);
    }

    function extractSnippet(content, query, length = 100) {
        const contentLower = content.toLowerCase();
        const queryLower = query.toLowerCase();
        const index = contentLower.indexOf(queryLower);
        if (index === -1) return content.slice(0, length * 2) + "...";

        const start = Math.max(0, index - length);
        const end = Math.min(content.length, index + query.length + length);
        let snippet = content.slice(start, end).trim();
        if (start > 0) snippet = "..." + snippet;
        if (end < content.length) snippet = snippet + "...";
        return highlightText(snippet, query);
    }

    function renderPosts() {
        const query = getQueryParam('q').trim();
        const queryLower = query.toLowerCase();
        termDisplay.innerText = query || "All Posts";

        const filtered = allTemplates.filter(post => {
            const title = post.dataset.title.toLowerCase();
            const content = post.dataset.content.toLowerCase();
            return title.includes(queryLower) || content.includes(queryLower);
        });

        countDisplay.innerText = filtered.length < 10 ? `0${filtered.length}` : filtered.length;

        const totalPages = Math.ceil(filtered.length / pageSize);
        let currentPage = getUrlPage();
        if (currentPage > totalPages) currentPage = totalPages || 1;

        const paginated = filtered.slice((currentPage - 1) * pageSize, currentPage * pageSize);

        if (paginated.length) {
            container.innerHTML = paginated.map(post => `
                <article class="group py-4 border-b border-gray-100 dark:border-zinc-800 last:border-0">
                    <span class="text-[10px] font-bold uppercase tracking-[0.3em] text-gray-400">
                        ${post.dataset.hijri || 'Archive'}
                    </span>
                    <h2 class="text-3xl md:text-4xl font-black mt-2 mb-6 leading-[0.85] uppercase tracking-tighter group-hover:italic transition-all">
                        <a href="${post.dataset.url}">${highlightText(post.dataset.title, query)}</a>
                    </h2>
                    <p class="text-lg text-gray-600 dark:text-zinc-400 leading-relaxed max-w-2xl">
                        ${extractSnippet(post.dataset.content, query)}
                    </p>
                </article>
            `).join('');
        } else {
            container.innerHTML = `<p class="py-20 text-xl font-bold opacity-30 uppercase tracking-widest text-center">No matches found.</p>`;
        }

        renderPagination(totalPages, currentPage);
    }

    function renderPagination(totalPages, currentPage) {
        if (totalPages <= 1) {
            paginationNav.innerHTML = '';
            return;
        }

        const params = new URLSearchParams(window.location.search);
        const prevPage = currentPage > 1 ? currentPage - 1 : null;
        const nextPage = currentPage < totalPages ? currentPage + 1 : null;

        const currentFormatted = currentPage < 10 ? `0${currentPage}` : currentPage;
        const totalFormatted = totalPages < 10 ? `0${totalPages}` : totalPages;

        paginationNav.innerHTML = `
            <a href="${prevPage ? '?q=' + getQueryParam('q') + '&page=' + prevPage : '#'}" 
               class="text-sm font-black uppercase tracking-widest hover:line-through ${!prevPage ? 'invisible' : ''}">
               ← Newer
            </a>
            
            <div class="text-sm font-black uppercase tracking-widest tabular-nums">
                Page <span>${currentFormatted}</span> of <span>${totalFormatted}</span>
            </div>
            
            <a href="${nextPage ? '?q=' + getQueryParam('q') + '&page=' + nextPage : '#'}" 
               class="text-sm font-black uppercase tracking-widest hover:line-through ${!nextPage ? 'invisible' : ''}">
               Older →
            </a>
        `;
    }

    renderPosts();
});
</script>
