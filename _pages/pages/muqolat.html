---
layout: Page
title: Muqolat
uid: muqolat
active: muqolat
permalink: /muqolat/
excerpt: Collection of translated articles and lectures from scholars of the Sunnah.
---
<div id="fatwa-container"></div>
<script id="fatwa-data" type="application/json">
[
  {% assign posts = site.posts | where_exp: "post", "post.categories contains 'muqolat'" %}
  {% for post in posts %}
    {
      "title": {{ post.title | jsonify }},
      "url": {{ post.url | jsonify }},
      "date": {{ post.date | date: "%Y-%m-%d" | jsonify }},
      "hijri": {{ post.hijri | jsonify }},
      "excerpt": {{ post.content | strip_html | truncatewords: 20 | jsonify }}
    }{% unless forloop.last %},{% endunless %}
  {% endfor %}
]
</script>
