---
layout: tailwind
title: The Groups & Sects
active: sects
excerpt: It is not Islam that is divided into sects, rather it is the people who differ, deviated from the Sunnah of their Prophet and deviated from the authentic teachings of Islam.
permalink: /sects/
---
<div id="fatwa-container" class="mt-5"></div>
<script id="fatwa-data" type="application/json">
[
  {% assign posts = site.posts | where_exp: "post", "post.categories contains 'sects'" %}
  {% for post in posts %}
    {
      "title": {{ post.title | jsonify }},
      "url": {{ post.url | jsonify }},
      "date": {{ post.date | date: "%Y-%m-%d" | jsonify }},
      "hijri": {{ post.hijri | jsonify }},
      "excerpt": {{ post.content | strip_html | truncatewords: 20 | jsonify }}
    }{% unless forloop.last %},{% endunless %}
  {% endfor %}
]
</script>
