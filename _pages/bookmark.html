---
layout: default
title: Saved fatwas
permalink: /fatwas/bookmark/
---

<h2>Saved Fatwas</h2>
<div class="d-flex justify-content-between align-items-center mb-3">
  <div>
    <button id="clearAllBtn" class="btn btn-danger btn-sm">Clear All</button>
  </div>
  <div>
    <span id="paginationInfo" class="small text-muted"></span>
    <button id="prevPage" class="btn btn-outline-secondary btn-sm">Previous</button>
    <button id="nextPage" class="btn btn-outline-secondary btn-sm">Next</button>
  </div>
</div>

<div id="savedPostsContainer" class="row row-cols-1 row-cols-md-3 g-4">
  <!-- Saved posts will appear here -->
</div>

<!-- Hidden container of all posts to reference from JS -->
<div id="allPosts" style="display:none;">
  {% for post in site.posts %}
  <div class="post-template"
       data-title="{{ post.title }}"
       data-slug="{{ post.url | remove: '/' }}"
       data-url="{{ post.url }}"
       data-id="{{ post.url | remove: '/' }}">
    <div class="card h-100">
      <div class="card-body">
        <a href="{{ post.url }}">
          <h5 class="card-title">{{ post.title }}</h5>
        </a>
      </div>
    </div>
  </div>
  {% endfor %}
</div>

<script>
  document.addEventListener("DOMContentLoaded", function () {
    const POSTS_PER_PAGE = 6;
    let currentPage = 1;
  
    const savedSlugs = JSON.parse(localStorage.getItem("savedPosts")) || [];
    const allTemplates = Array.from(document.querySelectorAll("#allPosts .post-template"));
    const container = document.getElementById("savedPostsContainer");
  
    const paginationInfo = document.getElementById("paginationInfo");
    const prevBtn = document.getElementById("prevPage");
    const nextBtn = document.getElementById("nextPage");
    const clearAllBtn = document.getElementById("clearAllBtn");
  
    function renderSavedCards() {
      const savedTemplates = allTemplates.filter(template =>
        savedSlugs.includes(template.dataset.slug)
      );
  
      const totalPages = Math.ceil(savedTemplates.length / POSTS_PER_PAGE);
      if (currentPage > totalPages) currentPage = totalPages || 1;
  
      const start = (currentPage - 1) * POSTS_PER_PAGE;
      const end = start + POSTS_PER_PAGE;
  
      const paginatedTemplates = savedTemplates.slice(start, end);
  
      container.innerHTML = "";
  
      if (!paginatedTemplates.length) {
        container.innerHTML = `<p class="text-muted">No saved fatwas yet.</p>`;
        paginationInfo.textContent = "";
        return;
      }
  
      paginatedTemplates.forEach(template => {
        const clone = template.cloneNode(true);
        const slug = clone.dataset.slug;
  
        // Add delete button inside the card body
        const body = clone.querySelector(".card-body");
        const removeBtn = document.createElement("button");
        removeBtn.textContent = "Remove";
        removeBtn.className = "btn btn-sm btn-outline-danger mt-2 remove-post";
        removeBtn.setAttribute("data-id", slug);
        body.appendChild(removeBtn);
  
        const colDiv = document.createElement("div");
        colDiv.className = "col";
        colDiv.appendChild(clone);
        container.appendChild(colDiv);
      });
  
      paginationInfo.textContent = `Page ${currentPage} of ${totalPages}`;
      prevBtn.disabled = currentPage === 1;
      nextBtn.disabled = currentPage === totalPages;
    }
  
    function updateStorage(newList) {
      localStorage.setItem("savedPosts", JSON.stringify(newList));
    }
  
    // Event delegation for delete buttons
    container.addEventListener("click", function (e) {
      if (e.target.classList.contains("remove-post")) {
        const id = e.target.getAttribute("data-id");
        const newSaved = savedSlugs.filter(slug => slug !== id);
        localStorage.setItem("savedPosts", JSON.stringify(newSaved));
        location.reload(); // re-render the page
      }
    });
  
    clearAllBtn.addEventListener("click", function () {
      if (confirm("Are you sure you want to clear all saved fatwas?")) {
        localStorage.removeItem("savedPosts");
        location.reload();
      }
    });
  
    prevBtn.addEventListener("click", function () {
      if (currentPage > 1) {
        currentPage--;
        renderSavedCards();
      }
    });
  
    nextBtn.addEventListener("click", function () {
      currentPage++;
      renderSavedCards();
    });
  
    renderSavedCards();
  });
  </script>
