---
layout: default
title: Saved fatwas
permalink: /fatwas/bookmark/
---

<h2>Saved Fatwas</h2>
<div class="d-flex justify-content-between align-items-center mb-3">
  <div>
    <button id="clearAllBtn" class="btn btn-danger btn-sm">Clear All</button>
  </div>
  <div>
    <span id="paginationInfo" class="small text-muted"></span>
    <button id="prevPage" class="btn btn-outline-secondary btn-sm">Previous</button>
    <button id="nextPage" class="btn btn-outline-secondary btn-sm">Next</button>
  </div>
</div>

<div id="savedPostsContainer" class="row row-cols-1 row-cols-md-3 g-4">
  <!-- Saved posts will appear here -->
</div>

<!-- Hidden container of all posts to reference from JS -->
<div id="allPosts" style="display:none;">
  {% for post in site.posts %}
  <div class="post-template"
       data-title="{{ post.title }}"
       data-slug="{{ post.url | remove: '/' }}"
       data-url="{{ post.url }}"
       data-id="{{ post.url | remove: '/' }}">
    <div class="card h-100">
      <div class="card-body">
        <a href="{{ post.url }}">
          <h5 class="card-title">{{ post.title }}</h5>
        </a>
      </div>
    </div>
  </div>
  {% endfor %}
</div>
<script>
  document.addEventListener("DOMContentLoaded", function () {
    const POSTS_PER_PAGE = 6;
    let currentPage = 1;
    let savedSlugs = JSON.parse(localStorage.getItem("savedPosts")) || [];
  
    const allTemplates = document.querySelectorAll("#allPosts .post-template");
    const container = document.getElementById("savedPostsContainer");
    const paginationInfo = document.getElementById("paginationInfo");
    const prevBtn = document.getElementById("prevPage");
    const nextBtn = document.getElementById("nextPage");
    const clearAllBtn = document.getElementById("clearAllBtn");
  
    function renderSavedCards() {
      const matchedPosts = Array.from(allTemplates).filter(post =>
        savedSlugs.includes(post.dataset.slug)
      );
  
      const totalPages = Math.ceil(matchedPosts.length / POSTS_PER_PAGE);
      currentPage = Math.min(currentPage, totalPages || 1); // stay in range
  
      const start = (currentPage - 1) * POSTS_PER_PAGE;
      const end = start + POSTS_PER_PAGE;
      const paginatedPosts = matchedPosts.slice(start, end);
  
      if (matchedPosts.length === 0) {
        container.innerHTML = `<p class="text-muted">No saved fatwas yet.</p>`;
        paginationInfo.textContent = "";
        return;
      }
  
      container.innerHTML = paginatedPosts.map(post => {
        const slug = post.dataset.slug;
        const title = post.dataset.title;
        const url = post.dataset.url;
        return `
          <div class="col">
            <div class="card h-100">
              <div class="card-body">
                <a href="${url}">
                  <h5 class="card-title">${title}</h5>
                </a>
                <button class="btn btn-sm btn-outline-danger mt-2 remove-post" data-id="${slug}">Remove</button>
              </div>
            </div>
          </div>
        `;
      }).join("");
  
      paginationInfo.textContent = `Page ${currentPage} of ${totalPages}`;
      prevBtn.disabled = currentPage === 1;
      nextBtn.disabled = currentPage === totalPages;
    }
  
    function updateLocalStorage() {
      localStorage.setItem("savedPosts", JSON.stringify(savedSlugs));
    }
  
    container.addEventListener("click", function (e) {
      if (e.target.classList.contains("remove-post")) {
        const id = e.target.getAttribute("data-id");
        savedSlugs = savedSlugs.filter(slug => slug !== id);
        updateLocalStorage();
        renderSavedCards();
      }
    });
  
    clearAllBtn.addEventListener("click", function () {
      if (confirm("Are you sure you want to clear all saved fatwas?")) {
        savedSlugs = [];
        updateLocalStorage();
        renderSavedCards();
      }
    });
  
    prevBtn.addEventListener("click", function () {
      if (currentPage > 1) {
        currentPage--;
        renderSavedCards();
      }
    });
  
    nextBtn.addEventListener("click", function () {
      currentPage++;
      renderSavedCards();
    });
  
    renderSavedCards();
  });
  </script>
