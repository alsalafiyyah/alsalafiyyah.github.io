---
layout: basic
title: Bookmarks
uid: bookmarks
permalink: /fatwas/bookmark/
---

{% include Breadcrumb.html %}
<h2>Bookmarks</h2>

<div class="mb-3 d-flex justify-content-between align-items-center">
  <input type="text" id="searchInput" class="form-control w-50 shadow-none" placeholder="Search bookmarks...">
  <button id="clearAllBtn" class="btn btn-danger ms-3 shadow-none">Clear All</button>
</div>

<div id="savedPostsContainer" class="row row-cols-1 row-cols-md-3 g-4">
  <!-- Saved posts will appear here -->
</div>

<nav id="paginationNav" class="mt-4">
  <!-- Pagination buttons will appear here -->
</nav>

<!-- Hidden container of all posts to reference from JS -->
<div id="allPosts" style="display:none;">
  {% for post in site.posts %}
  <div class="post-template"
       data-title="{{ post.title | escape }}"
       data-slug="{{ post.url | remove: '/' }}"
       data-url="{{ post.url }}">
    <div class="card h-100">
      <div class="card-body d-flex flex-column">
        <a href="{{ post.url }}"><h5 class="card-title">{{ post.title }}</h5></a>
        <button class="btn btn-sm btn-danger mt-auto delete-btn shadow-none" data-slug="{{ post.url | remove: '/' }}">Delete</button>
      </div>
    </div>
  </div>
  {% endfor %}
</div>

<script>
document.addEventListener("DOMContentLoaded", function () {
  const savedSlugs = JSON.parse(localStorage.getItem("savedPosts")) || [];
  const allTemplates = Array.from(document.querySelectorAll("#allPosts .post-template"));
  const container = document.getElementById("savedPostsContainer");
  const searchInput = document.getElementById("searchInput");
  const clearAllBtn = document.getElementById("clearAllBtn");
  const paginationNav = document.getElementById("paginationNav");

  const pageSize = 6; // Number of posts per page

  function getUrlPage() {
    const params = new URLSearchParams(window.location.search);
    return parseInt(params.get('page')) || 1;
  }

  function setUrlPage(page) {
    const params = new URLSearchParams(window.location.search);
    if (page > 1) {
      params.set('page', page);
    } else {
      params.delete('page');
    }
    window.history.replaceState({}, '', `${location.pathname}?${params.toString()}`);
  }

  function renderPosts() {
    const query = searchInput.value.toLowerCase();
    let filtered = allTemplates.filter(post => 
      savedSlugs.includes(post.dataset.slug) &&
      post.dataset.title.toLowerCase().includes(query)
    );

    const totalPages = Math.ceil(filtered.length / pageSize);
    let currentPage = getUrlPage();
    if (currentPage > totalPages) {
      currentPage = totalPages || 1;
      setUrlPage(currentPage);
    }

    const paginatedPosts = filtered.slice((currentPage - 1) * pageSize, currentPage * pageSize);

    if (paginatedPosts.length) {
      container.innerHTML = paginatedPosts.map(post => `<div class="col">${post.innerHTML}</div>`).join('');
    } else {
      container.innerHTML = `<p class="text-muted">No saved fatwas.</p>`;
    }

    renderPagination(totalPages, currentPage);
    attachDeleteEvents();
  }

  function renderPagination(totalPages, currentPage) {
    if (totalPages <= 1) {
      paginationNav.innerHTML = '';
      return;
    }
    let html = '<ul class="pagination justify-content-center">';
    for (let i = 1; i <= totalPages; i++) {
      html += `<li class="page-item shadow-none ${i === currentPage ? 'active' : ''}">
        <a class="page-link shadow-none" href="?page=${i}">${i}</a></li>`;
    }
    html += '</ul>';
    paginationNav.innerHTML = html;
  }

  function attachDeleteEvents() {
    container.querySelectorAll(".delete-btn").forEach(button => {
      button.addEventListener("click", function () {
        const slug = this.dataset.slug;
        const index = savedSlugs.indexOf(slug);
        if (index > -1) {
          savedSlugs.splice(index, 1);
          localStorage.setItem("savedPosts", JSON.stringify(savedSlugs));
          renderPosts();
        }
      });
    });
  }

  clearAllBtn.addEventListener("click", function () {
    if (confirm("Are you sure you want to clear all saved fatwas?")) {
      localStorage.removeItem("savedPosts");
      location.reload();
    }
  });

  searchInput.addEventListener("input", function () {
    setUrlPage(1);
    renderPosts();
  });

  renderPosts();
});
</script>
