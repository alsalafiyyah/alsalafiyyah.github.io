---
layout: basic
title: Search
permalink: /search/
---

{% include Breadcrumb.html %}
<h2>Search Results</h2>

<div id="searchResults" class="row row-cols-1 row-cols-md-3 g-4"></div>

<nav id="paginationNav" class="mt-4"></nav>

<!-- Hidden all posts -->
<div id="allPosts" style="display:none;">
  {% for post in site.posts %}
  <div class="post-template"
       data-title="{{ post.title | escape }}"
       data-content="{{ post.content | strip_html | normalize_whitespace | escape }}"
       data-url="{{ post.url }}">
    <div class="card h-100">
      <div class="card-body">
        <a href="{{ post.url }}">
          <h5 class="card-title">{{ post.title }}</h5>
          <p class="card-snippet d-none"></p> <!-- Snippet placeholder -->
        </a>
      </div>
    </div>
  </div>
  {% endfor %}
</div>

<script>
document.addEventListener("DOMContentLoaded", function () {
  const allTemplates = Array.from(document.querySelectorAll("#allPosts .post-template"));
  const container = document.getElementById("searchResults");
  const paginationNav = document.getElementById("paginationNav");

  const pageSize = 6; // posts per page

  function getQueryParam(name) {
    const params = new URLSearchParams(window.location.search);
    return params.get(name) || "";
  }

  function getUrlPage() {
    const params = new URLSearchParams(window.location.search);
    return parseInt(params.get('page')) || 1;
  }

  function setUrlPage(page) {
    const params = new URLSearchParams(window.location.search);
    params.set('page', page);
    history.replaceState({}, '', `${location.pathname}?${params.toString()}`);
  }

  function highlightText(text, query) {
    if (!query) return text;
    const regex = new RegExp(`(${query})`, "gi");
    return text.replace(regex, `<mark>$1</mark>`);
  }

  function extractSnippet(content, query, length = 30) {
    const contentLower = content.toLowerCase();
    const queryLower = query.toLowerCase();
    const index = contentLower.indexOf(queryLower);
    
    if (index === -1) return "";

    const start = Math.max(0, index - length);
    const end = Math.min(content.length, index + query.length + length);

    let snippet = content.slice(start, end).trim();

    // Add ellipsis if not full content
    if (start > 0) snippet = "..." + snippet;
    if (end < content.length) snippet = snippet + "...";

    return highlightText(snippet, query);
  }

  function renderPosts() {
    const query = getQueryParam('q').trim();
    const queryLower = query.toLowerCase();

    const filtered = allTemplates.filter(post => {
      const title = post.dataset.title.toLowerCase();
      const content = post.dataset.content.toLowerCase();
      return title.includes(queryLower) || content.includes(queryLower);
    });

    const totalPages = Math.ceil(filtered.length / pageSize);
    let currentPage = getUrlPage();
    if (currentPage > totalPages) {
      currentPage = totalPages || 1;
      setUrlPage(currentPage);
    }

    const paginated = filtered.slice((currentPage - 1) * pageSize, currentPage * pageSize);

    if (paginated.length) {
      container.innerHTML = paginated.map(post => {
        const tempDiv = document.createElement('div');
        tempDiv.innerHTML = post.innerHTML;

        // Highlight title
        const titleElem = tempDiv.querySelector(".card-title");
        if (titleElem) {
          titleElem.innerHTML = highlightText(titleElem.innerText, query);
        }

        // Generate snippet
        const snippetElem = tempDiv.querySelector(".card-snippet");
        if (snippetElem) {
          const snippet = extractSnippet(post.dataset.content, query);
          if (snippet) {
            snippetElem.classList.remove('d-none');
            snippetElem.innerHTML = snippet;
          }
        }

        return `<div class="col">${tempDiv.innerHTML}</div>`;
      }).join('');
    } else {
      container.innerHTML = `<p class="text-muted">No results found for "<strong>${query}</strong>".</p>`;
    }

    renderPagination(totalPages, currentPage);
  }

function renderPagination(totalPages, currentPage) {
  if (totalPages <= 1) {
    paginationNav.innerHTML = '';
    return;
  }

  const params = new URLSearchParams(window.location.search);
  const makePageLink = (page) => {
    params.set('page', page);
    return `<li class="page-item ${page === currentPage ? 'active' : ''}">
      <a class="page-link" href="?${params.toString()}">${page}</a>
    </li>`;
  };

  let html = '<ul class="pagination justify-content-center">';

  if (currentPage > 1) {
    params.set('page', currentPage - 1);
    html += `<li class="page-item">
      <a class="page-link" href="?${params.toString()}">&laquo;</a>
    </li>`;
  }

  const pageLinks = [];
  
  if (totalPages <= 7) {
    // Show all pages
    for (let i = 1; i <= totalPages; i++) {
      pageLinks.push(makePageLink(i));
    }
  } else {
    // Show first 2 pages
    pageLinks.push(makePageLink(1));
    if (currentPage > 4) pageLinks.push(`<li class="page-item disabled"><span class="page-link">...</span></li>`);

    const startPage = Math.max(2, currentPage - 1);
    const endPage = Math.min(totalPages - 1, currentPage + 1);

    for (let i = startPage; i <= endPage; i++) {
      pageLinks.push(makePageLink(i));
    }

    if (currentPage < totalPages - 3) pageLinks.push(`<li class="page-item disabled"><span class="page-link">...</span></li>`);
    
    pageLinks.push(makePageLink(totalPages));
  }

  html += pageLinks.join('');

  if (currentPage < totalPages) {
    params.set('page', currentPage + 1);
    html += `<li class="page-item">
      <a class="page-link" href="?${params.toString()}">&raquo;</a>
    </li>`;
  }

  html += '</ul>';

  paginationNav.innerHTML = html;
}


  renderPosts();
});
</script>
