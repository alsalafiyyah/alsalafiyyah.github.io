<div class="mb-6">
    <div class="bg-black text-white px-4 py-2 flex justify-between items-center">
        <span class="text-[10px] font-black uppercase tracking-[0.2em]">Stream / External</span>
        <div class="flex gap-2">
            <div class="w-2 h-2 bg-white rounded-full"></div>
            <div class="w-2 h-2 bg-white opacity-20 rounded-full"></div>
        </div>
    </div>    
    <div class="relative w-full overflow-hidden border-x-4 border-b-4 border-black" style="padding-top: 56.25%;">
        <iframe 
            class="absolute top-0 left-0 bottom-0 right-0 w-full h-full"
            src="https://www.youtube.com/embed/{{page.videoID}}?modestbranding=1&rel=0" 
            title="YouTube video player" 
            frameborder="0" 
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
            allowfullscreen>
        </iframe>
    </div>
</div>
