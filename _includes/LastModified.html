 <li class="list-group-item">
   <div class="ms-2 me-auto">
     <div property="dateModified" class="fw-normal">
      {{ "Updated :" | capitalize }}
     </div>
     <span class="fw-semibold">
      {% if page %}
       <b><span id='last-modified'></span></b>
      {% else %}
       <b><span>-</span></b>
      {% endif %}
     </span> 
   </div>
 </li>
