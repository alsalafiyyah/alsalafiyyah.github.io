<li class="list-group-item">
<div class="ms-2 me-auto">
 <div class="fw-normal">
  {{ "Estimated Reading Time :" | capitalize }} 
 </div>   
<span class="reading-time" title="Estimated read time">
  {% assign words = content | number_of_words %}
  {% if words < 360 %}
    <span class="badge text-bg-danger">1</span> min read
  {% else %}
    <span class="badge text-bg-danger">{{ words | divided_by:180 }}</span> min read
  {% endif %}
</span>
</div>
</li>
