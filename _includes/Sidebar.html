<!-- Sidebar -->
<aside role="complementary"
  itemscope 
  itemtype="http://schema.org/WPSideBar"><!-- Aside -->

<section class="mt-5"><!-- Aside section -->  
<div class="container-lg"><!-- Aside container -->

<div class="accordion accordion-flush is_mobile d-lg-none" id="accordionFooter"><!-- Accordion footer -->
  
  <div class="accordion-item bg-transparent">
    <h2 class="accordion-header">
      <button class="accordion-button collapsed bg-transparent shadow-none h4" type="button" data-bs-toggle="collapse" data-bs-target="#footer_quick_links" aria-expanded="false" aria-controls="footer_quick_links">
        Quick Links
      </button>
    </h2>
    <div id="footer_quick_links" class="accordion-collapse collapse" data-bs-parent="#accordionFooter">
     <div class="accordion-body">
      <ul class="list-group list-group-flush">
       {% for item in site.data.locales[page.locale].aside_quick_links %}
        <li class="list-group-item">
         <a href="{{ item.url }}">{{ item.title }}</a>
        </li>
       {% endfor %}
      </ul>
      </div>
    </div>
  </div>

  <div class="accordion-item bg-transparent">
    <h2 class="accordion-header">
      <button class="accordion-button collapsed bg-transparent shadow-none h4" type="button" data-bs-toggle="collapse" data-bs-target="#aside_external_links" aria-expanded="false" aria-controls="aside_external_links">
        Others
      </button>
    </h2>
    <div id="aside_external_links" class="accordion-collapse collapse" data-bs-parent="#accordionFooter">
     <div class="accordion-body">
      <ul class="list-group list-group-flush">
       {% for item in site.data.locales[page.locale].aside_external_links %}
        <li class="list-group-item">
         <a href="{{ item.url }}">{{ item.title }}</a>
        </li>
       {% endfor %}
      </ul>
      </div>
    </div>
  </div>
  
</div><!-- /Accordion footer --> 

</div><!-- /Aside container -->
</section><!-- /Aside section -->
</aside><!-- /Aside -->
