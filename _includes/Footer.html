<!-- Footer -->
<footer role="contentinfo" vocab="http://schema.org" itemtype="WPFooter" class="footer mt-auto py-3">
<div class="container">
 <div class="hstack gap-3">
  <div class="p-2">&copy; <span property="copyrightYear">{{ "2019" | capitalize }} - {{ 'now' | date: "%Y" }}</span> <span property="copyrightHolder" vocab="http://schema.org" itemtype="Person">
    <span property="name">
     {{ site.title }}
    </span>
  </span>
  </div>
  {% for item in site.data.setting.social_icons_footer %}
  <div class="p-2">
    <a target="_blank" 
       href="{{ item.url }}">
       <i class="bi bi-{{ item.icon }}"></i> 
       <span class="visually-hidden">{{ item.name }}</span>
    </a>
  </div>  
  {% endfor %}
 </div>     
</div>
</footer>
