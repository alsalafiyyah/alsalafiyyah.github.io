<script defer language="javascript" type="text/javascript">
    function setAccessedDate() {
      if (document.getElementById('accessed-on')) {
        var now = new Date();
        var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
        var formattedDate = now.getDate().padStart(2,'0')+" "+months[now.getMonth()]+" "+now.getFullYear();
        document.getElementById('accessed-on').textContent = " (accessed " + formattedDate + ")";
      }
    }
    function setModifiedDate() {
      if (document.getElementById('last-modified')) {
        fetch("https://api.github.com/repos/alsalafiyyah/alsalafiyyah.github.io/commits?path={{ page.path }}")
          .then((response) => {
            return response.json();
          })
          .then((commits) => {
            var modified = commits[0]['commit']['committer']['date'].slice(0,10);
            if(modified != "{{ page.date | date: "%d %b, %Y" }}") {
              document.getElementById('last-modified').textContent = " " + modified + " ";
            }
          });
      }
    }
  </script>

                title: "{{ page.title }}",
                text: "{{ site.url }}{{site.baseurl}}{{ page.url }}",

            .catch(error => console.log('Error sharing:', error));
    }
}

<script type="text/javascript">
    $('.button-url-copy').copiq({
        parent: '.item',
        content: '.text',
        onSuccess: function($element, source, selection) {
            $('span', $element).text($element.attr("data-text-copied"));
            setTimeout(function() {
                $('span', $element).text($element.attr("data-text"));
            }, 2000);
        }
    });
</script>

<script>
  const slug = '{{ page.slug }}';
  const url = '{{ site.url }}{{ page.url }}';
  const logoURL = 'https://alsalafiyyah.github.io/assets/images/logo.svg'; // replace with your actual logo path

  // Create QR Code
  new QRCode(document.getElementById("qrcode-" + slug), {
    text: url,
    width: 256,
    height: 256,
    correctLevel: QRCode.CorrectLevel.H
  });

  // Overlay Logo & Enable Download
  function downloadQRWithLogo(slug) {
    const qrDiv = document.querySelector("#qrcode-" + slug + " canvas");
    const canvas = document.getElementById("qr-canvas-" + slug);
    const ctx = canvas.getContext("2d");

    // Set same size as QR
    canvas.width = qrDiv.width;
    canvas.height = qrDiv.height;

    // Draw QR to canvas
    ctx.drawImage(qrDiv, 0, 0);

    // Load logo
    const logo = new Image();
    logo.src = logoURL;
    logo.onload = () => {
      const logoSize = canvas.width * 0.25; // 25% of QR code
      const x = (canvas.width - logoSize) / 2;
      const y = (canvas.height - logoSize) / 2;
      ctx.drawImage(logo, x, y, logoSize, logoSize);

      // Trigger download
      const link = document.createElement('a');
      link.download = slug + '-qr.png';
      link.href = canvas.toDataURL();
      link.click();
    };
  }
</script>
