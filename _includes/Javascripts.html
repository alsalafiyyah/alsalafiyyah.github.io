<script defer language="javascript" type="text/javascript">
    function setAccessedDate() {
      if (document.getElementById('accessed-on')) {
        var now = new Date();
        var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
        var formattedDate = now.getDate().padStart(2,'0')+" "+months[now.getMonth()]+" "+now.getFullYear();
        document.getElementById('accessed-on').textContent = " (accessed " + formattedDate + ")";
      }
    }
    function setModifiedDate() {
      if (document.getElementById('last-modified')) {
        fetch("https://api.github.com/repos/alsalafiyyah/alsalafiyyah.github.io/commits?path={{ page.path }}")
          .then((response) => {
            return response.json();
          })
          .then((commits) => {
            var modified = commits[0]['commit']['committer']['date'].slice(0,10);
            if(modified != "{{ page.date | date: "%d %b, %Y" }}") {
              document.getElementById('last-modified').textContent = " " + modified + " ";
            }
          });
      }
    }
  </script>

<script>
  document.addEventListener("DOMContentLoaded", function () {
    let savedPosts = JSON.parse(localStorage.getItem("savedPosts")) || [];

    function updateIcons() {
      document.querySelectorAll(".save-post-icon").forEach(icon => {
        const postId = icon.getAttribute("data-id");
        if (savedPosts.includes(postId)) {
          icon.classList.remove("bi-bookmark");
          icon.classList.add("bi-bookmark-fill", "text-warning");
        } else {
          icon.classList.remove("bi-bookmark-fill", "text-warning");
          icon.classList.add("bi-bookmark");
        }
      });
    }

    function bindClickEvents() {
      document.querySelectorAll(".save-post-icon").forEach(icon => {
        icon.addEventListener("click", function () {
          const postId = this.getAttribute("data-id");
          if (!postId) return;

          const index = savedPosts.indexOf(postId);
          if (index > -1) {
            savedPosts.splice(index, 1);
          } else {
            savedPosts.push(postId);
          }

          localStorage.setItem("savedPosts", JSON.stringify(savedPosts));
          updateIcons();
        });
      });
    }

    updateIcons();
    bindClickEvents();
  });
</script>

{% assign allowed = "audios,muqolat,wahhabism,bidah,sects,rulership,biography" | split: "," %}
{% if allowed contains page.active %}
<script>
document.addEventListener("DOMContentLoaded", function () {
  const POSTS_PER_PAGE = 20;
  const urlParams = new URLSearchParams(window.location.search);
  const currentPage = parseInt(urlParams.get("page")) || 1;
  const raw = document.getElementById("fatwa-data");
  const data = JSON.parse(raw.textContent);
  const start = (currentPage - 1) * POSTS_PER_PAGE;
  const end = start + POSTS_PER_PAGE;
  const totalPages = Math.ceil(data.length / POSTS_PER_PAGE);
  const container = document.getElementById("fatwa-container");
  const postsToShow = data.slice(start, end);

  container.innerHTML = postsToShow.map(post => `
  <div itemscope itemtype="https://schema.org/NewsArticle" class="col mb-3 fatwas">
    <a href="${post.url}" class="d-block mb-2">
      <h3>${post.title}</h3>
    </a>
    <p class="mb-1 fst-italic">
     ${post.excerpt}
    </p>
    <div class="post-meta d-flex justify-content-between mt-0 mb-3 text-danger">
     ${post.hijri}
    </div>
  </div>
  `).join("");

  if (totalPages > 1) {
    const pagination = document.createElement("nav");
    let html = `<div class="pagination d-flex gap-2 mt-5 justify-content-center">`;

    if (currentPage > 1) {
      html += `<a href="?page=${currentPage - 1}" class="btn btn-outline-danger">Previous</a>`;
    }

    for (let i = 1; i <= totalPages; i++) {
      html += `<a href="?page=${i}" class="btn ${i === currentPage ? 'btn-danger' : 'btn-outline-danger'}">${i}</a>`;
    }

    if (currentPage < totalPages) {
      html += `<a href="?page=${currentPage + 1}" class="btn btn-outline-danger">Next</a>`;
    }

    html += `</div>`;
    pagination.innerHTML = html;
    container.appendChild(pagination);
  }
});
</script>
{% endif %}
