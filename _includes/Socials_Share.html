<div class="card bg-transparent border-danger mt-4">
  <div class="position-absolute top-0 start-50 translate-middle badge text-bg-danger">
   Share
  </div>
  <div class="card-body">
  <div class="mt-3">  
  <ul class="list-inline d-flex justify-content-center text-center">  
   <li class="list-inline-item">  
    <a href="https://www.facebook.com/sharer.php?u={{ site.url }}{{site.baseurl}}{{ page.url }}" 
       target="_blank" 
       rel="nofollow">
     <span class="badge fs-6 text-bg-dark">
       <i class="bi bi-facebook"></i>  
     </span>
    </a>
   </li>
   <li class="list-inline-item">  
    <a href="https://x.com/intent/tweet?text={{ page.title }}&url={{ site.url }}{{site.baseurl}}{{ page.url }}" 
       target="_blank" 
       rel="nofollow">
     <span class="badge fs-6 text-bg-dark">
       <i class="bi bi-twitter-x"></i>
     </span>
    </a>
   </li> 
   <li class="list-inline-item">  
    <a href="https://t.me/share/url?url={{ site.url }}{{site.baseurl}}{{ page.url }}" target="_blank" rel="nofollow">
     <span class="badge fs-6 text-bg-dark">
       <i class="bi bi-telegram"></i> 
     </span>
    </a>
   </li>
    <li class="list-inline-item">  
    <a href="https://wa.me/?text={{ site.url }}{{site.baseurl}}{{ page.url }} {{ page.excerpt }}" 
       target="_blank" 
       rel="nofollow">
     <span class="badge fs-6 text-bg-dark">
       <i class="bi bi-whatsapp"></i>
     </span>
    </a>
   </li>  
   <li class="list-inline-item">  
    <a href="https://threads.net/intent/post?text={{ site.url }}{{site.baseurl}}{{ page.url }}" 
       target="_blank" 
       rel="nofollow">
     <span class="badge fs-6 text-bg-dark">
       <i class="bi bi-threads"></i>
     </span>
    </a>
   </li>  
   <li class="list-inline-item">  
    <a onclick="onShareCLick()" role="button">
     <span class="badge fs-6 text-bg-dark">
       <i class="bi bi-box-arrow-up"></i>
     </span>
    </a>
   </li>  
  </ul>
  </div>
<!-- Copy clipboard -->
<div class="item mt-4">
 <div class="input-group input-group-sm text">    
  <input type="text" class="form-control shadow-none border-danger" placeholder="{{ site.url }}{{site.baseurl}}{{ page.url }}" aria-label="{{ site.url }}{{site.baseurl}}{{ page.url }}" aria-describedby="button-copy">
  <button class="btn btn-outline-danger shadow-none btn-sm button-url-copy" type="button" id="button-copy" data-text="Copy" data-text-copied="Copied"><i class="bi bi-copy"></i> <span>Copy</span></button>
 </div>
</div><!-- /Copy clipboard -->
 </div>
</div>
