<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="generator" content="Jekyll v{{ jekyll.version }}" />
<title>{{ page.title | default: site.title | escape }}</title>

<meta name="description" content="{{ page.summary | default: site.description | strip_html | normalize_whitespace | truncate: 160 | escape }}"/>
<link rel="canonical" href="{{ page.url | replace:'/index.html','/' | absolute_url }}" />
<meta name="robots" content="index, follow">

<meta property="og:site_name" content="{{ site.title | escape }}" />
<meta property="og:title" content="{{ page.title | default: site.title | escape }}" />
<meta property="og:description" content="{{ page.summary | default: site.description | strip_html | normalize_whitespace | truncate: 160 | escape }}"/>
<meta property="og:image" content="{{ page.image | default: '/assets/images/fb.jpg' | absolute_url }}" />
<meta property="og:type" content="{% if page.date %}article{% else %}website{% endif %}" />
<meta property="og:url" content="{{ page.url | replace:'/index.html','/' | absolute_url }}" />

<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="{{ page.title | default: site.title | escape }}">
<meta name="twitter:description" content="{{ page.summary | default: site.description | strip_html | normalize_whitespace | truncate: 160 | escape }}"/>
<meta name="twitter:image" content="{{ page.image | default: '/assets/images/fb.jpg' | absolute_url }}"/>

<meta name="theme-color" content="#000000"> <meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="{{ '/manifest.json' | absolute_url }}">
<link rel="apple-touch-icon" sizes="180x180" href="{{ '/assets/apple-touch-icon.png' | absolute_url }}">
<link rel="icon" type="image/x-icon" href="{{ '/assets/images/favicon.ico' | absolute_url }}" />

{% if site.webmaster_verifications %}
<meta name="p:domain_verify" content="{{ site.webmaster_verifications.domain_verify }}"/>
<meta name="google-site-verification" content="K7QDv3cEwylAu_9fndO3ebQmNowxxRYCpqDEzQKQOy4" />
<meta name="yandex-verification" content="{{ site.webmaster_verifications.yandex }}" />
<meta name="msvalidate.01" content="{{ site.webmaster_verifications.bing }}" />
<meta name="google-adsense-account" content="{{ site.webmaster_verifications.google-ads }}">
<meta name="norton-safeweb-site-verification" content="{{ site.webmaster_verifications.norton-safeweb }}" />
<meta name="wot-verification" content="{{ site.webmaster_verifications.wot-verification }}"/>
{% endif %}

{% if page.date %}
<meta property="article:published_time" content="{{ page.date | date_to_xmlschema }}">
{% endif %}

{% if paginator.previous_page %}
<link rel="prev" href="{{ paginator.previous_page_path | absolute_url }}" />
{% endif %}
{% if paginator.next_page %}
<link rel="next" href="{{ paginator.next_page_path | absolute_url }}" />
{% endif %}

<link rel="alternate" type="application/rss+xml" title="{{ site.title }}" href="{{ '/feed.xml' | absolute_url }}">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
<script src="{{ '/assets/tailwindcss.js' | absolute_url }}"></script>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="{{ '/assets/custom-styles.css' | absolute_url }}">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Playfair+Display:ital,wght@0,900;1,900&display=swap" rel="stylesheet">
<script type="application/ld+json">
[
  {
    "@context": "https://schema.org",
    "@type": "{% if page.date %}BlogPosting{% else %}WebPage{% endif %}",
    "headline": {{ page.title | default: site.title | jsonify }},
    "description": {{ page.summary | default: site.description | strip_html | jsonify }},
    "url": {{ page.url | absolute_url | jsonify }},
    {% if page.date %}"datePublished": "{{ page.date | date_to_xmlschema }}",{% endif %}
    "publisher": {
      "@type": "Organization",
      "name": "{{ site.title }}",
      "logo": {
        "@type": "ImageObject",
        "url": "{{ '/assets/images/logo.png' | absolute_url }}"
      }
    }
  },
  {
    "@context": "https://schema.org",
    "@type": "BreadcrumbList",
    "itemListElement": [
      {
        "@type": "ListItem",
        "position": 1,
        "name": "Home",
        "item": "{{ site.url }}{{ site.baseurl }}/"
      }
      {% if page.url != "/" %}
      ,{
        "@type": "ListItem",
        "position": 2,
        "name": {{ page.title | jsonify }},
        "item": {{ page.url | absolute_url | jsonify }}
      }
      {% endif %}
    ]
  }
  {% if page.url == "/" or page.url == "/index.html" %}
  ,{
    "@context": "https://schema.org",
    "@type": "WebSite",
    "url": "{{ site.url }}{{ site.baseurl }}/",
    "potentialAction": {
      "@type": "SearchAction",
      "target": {
        "@type": "EntryPoint",
        "urlTemplate": "{{ site.url }}{{ site.baseurl }}/search/?q={search_term_string}"
      },
      "query-input": "required name=search_term_string"
    }
  }
  {% endif %}
]
</script>
<!-- Google tag (gtag.js) -->
<link href="https://www.googletagmanager.com/gtag/js?id={{ site.webmaster_verifications.gtag_manager }}" rel="prefetch" as="script">
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', '{{ site.webmaster_verifications.gtag_manager }}');
</script>
