<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="MobileOptimized" content="320" />
<meta name="generator" content="Jekyll v{{ jekyll.version }}" />
<meta http-equiv='content-language' content='en'>
<meta name="HandheldFriendly" content="True">
<meta name="date" content="{{ page.date | date_to_xmlschema }}">
<meta property="og:locale" content="{{ page.locale | default: 'en-gb' }}" />
<meta name="directory" content="submission">
<meta name="news_keywords" content="{{ site.keywords }}">
<meta name="keywords" content="{{ site.keywords }}"/>
<meta name="author" content="{{ site.author }}">
<meta name="theme-color" content="Canvas">
<meta name="coverage" content="Worldwide">
<meta name="distribution" content="Global">
<meta name="rating" content="General">
<meta name="revisit-after" content="3 days">
<meta name="subtitle" content="{{ page.title | default: site.title | escape }}">
<meta name="target" content="all">
<meta name="identifier-URL" content="{{ page.url | replace:/index.html','/' | absolute_url }}">
<meta name="directory" content="submission">
<meta itemprop="name" content="{{ page.title | default: site.title | escape }}">
<meta http-equiv="Expires" content="0">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Cache-Control" content="no-cache">
<meta http-equiv="imagetoolbar" content="no">
<meta http-equiv="x-dns-prefetch-control" content="off">
<meta name="url" content="{{ page.url | replace:/index.html','/' | absolute_url }}">
<meta name="robots" content="index,follow">
<meta name="title" content="{{ page.title | default: site.title | escape }}">
<meta name="abstract" content="{{ page.excerpt | default: site.description | strip_html | normalize_whitespace | truncate: 160 | escape }}">
<meta itemprop="image" content="{{ '/assets/images/fb.jpg' | absolute_url }}"/>

<!-- IOS Meta -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-touch-fullscreen" content="yes">
<meta name="apple-mobile-web-app-title" content="{{ page.title | default: site.title | escape }}" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="format-detection" content="telephone=no">

<!-- Meta OpenGraph -->
<meta property="og:site_name" content="{{ page.title | default: site.title | escape }}" />
<meta property="og:title" content="{{ page.title | default: site.title | escape }}" />
<meta property="og:image" content="{{ '/assets/images/fb.jpg' | absolute_url }}" />
<meta property="og:type" content="website" />
<meta property="og:url" content="{{ page.url | replace:'/index.html','/' | absolute_url }}" />
<meta property="og:description" content="{{ page.excerpt | default: site.description | strip_html | normalize_whitespace | truncate: 160 | escape }}"/>

<!-- Meta X Twitter -->
<meta name="twitter:title" content="{{ page.title | default: site.title | escape }}">
<meta property="twitter:url" content="{{ page.url | replace:'/index.html','/' | absolute_url }}" />
<meta name="twitter:description" content="{{ page.excerpt | default: site.description | strip_html | normalize_whitespace | truncate: 160 | escape }}"/>
<meta name="twitter:image" content="{{ '/assets/images/fb.jpg' | absolute_url }}"/>

<!-- Meta Verifications -->
<meta name="p:domain_verify" content="{{ site.webmaster_verifications.domain_verify }}"/>
<meta name="google-site-verification" content="K7QDv3cEwylAu_9fndO3ebQmNowxxRYCpqDEzQKQOy4" />
<meta name="yandex-verification" content="{{ site.webmaster_verifications.yandex }}" />
<meta name="msvalidate.01" content="{{ site.webmaster_verifications.bing }}" />
<meta name="google-adsense-account" content="{{ site.webmaster_verifications.google-ads }}">
<meta name="norton-safeweb-site-verification" content="{{ site.webmaster_verifications.norton-safeweb }}" />
<meta name="wot-verification" content="{{ site.webmaster_verifications.wot-verification }}"/>

<!-- IE Meta -->
<meta http-equiv='cleartype' content='on'>
<meta http-equiv='Page-Enter' content='RevealTrans(Duration=2.0,Transition=2)'>
<meta http-equiv='Page-Exit' content='RevealTrans(Duration=3.0,Transition=12)'>
<meta name='mssmarttagspreventparsing' content='true'>
<meta name='msapplication-navbutton-color' content='red'>
<meta name='msapplication-tooltip' content='Launch {{ site.title }} Site'>
<meta name='msapplication-starturl' content='{{ site.url }}'>
<meta content="IE=edge,chrome=1" http-equiv="X-UA-Compatible"/>
<meta name='msapplication-window' content='width=800;height=600'>
<title>{{ page.title | default: site.title | escape }}</title>
<meta name="description" content="{{ page.excerpt | default: site.description | strip_html | normalize_whitespace | truncate: 160 | escape }}"/>
<meta name="summary" content="{{ page.excerpt | default: site.description | strip_html | normalize_whitespace | truncate: 160 | escape }}"/>
<link rel="canonical" href="{{ page.url | replace:'/index.html','/' | absolute_url }}" />
<link rel="shortlink" href="{{ page.url | replace:'/index.html','/' | absolute_url }}"/>
<link rel="bookmark" title="{{ page.title | default: site.title | escape }}" href="{{ page.url | replace:'/index.html','/' | absolute_url }}">

{% if page.date %}
<meta property="article:published_time" content="{{ page.date | date_to_xmlschema }}">
<meta name="dc.date" content="{{ page.date | date_to_xmlschema }}">
{% endif %}
{% if page.last_modified_at %}
<meta property="article:modified_time" content="{{ page.last_modified_at | date_to_xmlschema }}">
{% endif %}

{% if paginator.previous_page %}
<link rel="prev" href="{{ paginator.previous_page_path | absolute_url }}" />
{% endif %}
{% if paginator.next_page %}
<link rel="next" href="{{ paginator.next_page_path | absolute_url }}" />
{% endif %}

<link rel="alternate" type="application/rss+xml" title="{{ site.title | escape }}" href="{{ '/feed.xml' | absolute_url }}">
<link href="{{ '/assets/images/apple_splash_1125.png' | absolute_url }}" sizes="1125x2436" rel="apple-touch-startup-image"/>
<link href="{{ '/assets/images/apple_splash_1242.png' | absolute_url }}" sizes="1242x2208" rel="apple-touch-startup-image"/>
<link href="{{ '/assets/images/apple_splash_750.png' | absolute_url }}" sizes="750x1334" rel="apple-touch-startup-image"/>
<link href="{{ '/assets/images/apple_splash_640.png' | absolute_url }}" sizes="640x1136" rel="apple-touch-startup-image"/>
<link rel="apple-touch-icon" sizes="180x180" href="{{ '/assets/apple-touch-icon.png' | absolute_url }}">
<link rel="icon" href="{{ '/assets/images/favicon.ico?v=3' | absolute_url }}" type="image/x-icon" />
<link rel="manifest" href="{{ '/manifest.json' | prepend: site.baseurl }}">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Playfair+Display:ital,wght@0,900;1,900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .serif { font-family: 'Playfair Display', serif; }
        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: black; }
        .dark ::-webkit-scrollbar-thumb { background: white; }

        /* --- Jekyll Markdown Custom Styles --- */
        h3, h4, h5, h6 {
            font-family: 'Inter', sans-serif;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -0.05em; /* Fixed: 'tracking' is not CSS, use letter-spacing */
            line-height: 0.9;
            margin-top: 2.5rem;
            margin-bottom: 1.5rem;
        }

        h1 { font-size: 4rem; text-transform: none; font-family: 'Playfair Display', serif; }
        h2 { font-size: 3rem; border-bottom: 4px solid padding-bottom: 0.5rem; font-weight: 900; }
        
        #question, #answer {
            font-family: 'Inter', sans-serif;
            font-size: 1.25rem;
            line-height: 1.8;
            margin-bottom: 1.5rem;
            font-weight: bold;
        }

        /* Footnotes */
        .footnotes {
            margin-top: 4rem;
            padding-top: 2rem;
            border-top: 1px solid #e5e5e5;
            font-size: 0.875rem;
            color: #666;
        }
        .footnotes ol { list-style-type: decimal; ! important;}

        /* Standard Paragraphs */
        article p {
            margin-bottom: 1.5rem;
            font-size: 1.125rem;
            line-height: 1.75;
        }

        hr { border: none; border-top: 0px solid black; margin: 3rem 0; }
    </style>
<!-- Google tag (gtag.js) -->
<link href="https://www.googletagmanager.com/gtag/js?id={{ site.webmaster_verifications.gtag_manager }}" rel="prefetch" as="script">
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', '{{ site.webmaster_verifications.gtag_manager }}');
</script>
