  google-ads        : "ca-pub-1975848559090325" # google-adsense-account
  norton-safeweb    : "52A5Z1I99X-9SKMGBF3GZXFPIJW3M9OZNUFSIEUNQYQEAEY4KKQDC0HTSBPDJMUQL5H1EE8JK6-27UONEJJNQA1QHRAZKZWA3LRE3M19YL-LM7LW7HIO1EAW44XSXYH1" # norton-safeweb-site-verification
  email_webmaster   : "arubalessandra@gmail.com" 
