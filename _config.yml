title               : "Al-Salafiyyah"
description         : "Explore Islamic legal rulings issued by the scholars of the Sunnah and the Imam of the Salaf from among Ahlus-Sunnah wal-Jama'ah on worship, creed, bidah, family law and so many on. "
slogan              : "For Islamic Verdicts"
short_desc          : "A repository of Fatwas issued by the prominent scholars of Ahlus-Sunnah wal-jama'ah."
baseurl             : "/"
keywords            : "salafi, salaf, manhaj, islam, knowledge, shariah, muslim, islamic, fatwas, bidah, sunnah, muslimah, bid'ah, dawah, da'wah, lectures, arabic, sermon, musliman, community, ahlus sunnah wal jamaah, ahlus sunnah, sunnis, sunni, tawhid, tauhid, allah, prophets, prophet muhammad, rasul, rasulullah, muhammad, sahabah"
url                 : "https://alsalafiyyah.github.io"
author              : "Instagram@Alsalafiyyah"
contact:
  name              : "Instagram@Alsalafiyyah"
  email             : "alsalafiyyah@icloud.com"
safe                : true
future              : true
g_search_value      : "alsalafiyyah.github.io" # google search value
encoding            : "utf-8"
markdown_ext        : "markdown,mkdown,mkdn,mkd,md"
permalink           : pretty
markdown            : kramdown
highlighter         : rouge
locale              : ["en", "ar"]
defaultLang         : en
timezone            : Asia/Riyadh
github_username     : alsalafiyyah
git_repo            : alsalafiyyah.github.io
keep_files          : [images]
kramdown:
  syntax_highlighter_opts:
      disable : true

paginate            : 20
paginate_path       : "/fatwas/:num/"

