Tags                : '/tags/'
tag_page            : '/tags/'
Categories          : '/category/'
category_page       : '/category/'

# Manifest
manifest_name      : "Al-Salafiyyah"
manifest_desc      : "This site is dedicated to presenting the pure teachings of Islam and Sunnah, refuting bidahs, the lies and distortions."
manifest_lang      : "en_EN"
manifest_bg_color  : "#E5DCD7"
manifest_short_name: "Al-Salafiyyah"
manifest_display   : "standalone"

include:
  - _pages

plugins:
  - jekyll-feed
  - jekyll-paginate
  - jekyll-sitemap

exclude:
  - bin
  - tmp
  - .jekyll-cache
  - .jekyll-metadata
  - .sass-cache
  - config
  - vite.config.ts
  - Procfile.dev
  - Makefile
  - .gitignore
  - docs
  - README.md
  - README
  - LICENSE
  - CODE_OF_CONDUCT.md 
  - vendor
  - node_modules
  - Gemfile
  - Gemfile.lock
  - "sample*.png" 

defaults:
  # _posts
  - scope:
      path: "_posts/**"
      type: posts
    values:
      layout: post
      permalink: /:title/
  # _posts/audios/
  - scope:
      path: "_posts/audios/**"
      type: posts
    values:
      layout: post
      active: audios
      permalink: /audios/:title/
  # _posts/videos/    
  - scope:
      path: "_posts/videos/**"
      type: posts
    values:
      layout: post
      active: videos
      permalink: /videos/:title/
  # _posts/muqolat/
  - scope:
      path: "_posts/muqolat/**"
      type: posts
    values:
      layout: post
      permalink: /muqolat/:title/    
  # _posts/wahhabism/
  - scope:
      path: "_posts/wahhabism/**"
      type: posts
    values:
      layout: post
      permalink: /wahhabism/:title/
  # _posts/biography/
  - scope:
      path: "_posts/biography/**"
      type: posts
    values:
      layout: post
      permalink: /biography/:title/   
  # _pages
  - scope:
      path: "_pages"
      type: "pages"
    values:
      layout: "page"
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "Page"

# Collections
collections:
  fawaid:
    output: true
    permalink       : /:collection/:slug

