---
layout: null
---
<!DOCTYPE html>
<html lang="en">
<head>
{% include head.html %}
</head>
<body itemscope itemtype="https://schema.org/WebPage" class="bg-white dark:bg-zinc-950 dark:text-zinc-100 text-black antialiased selection:bg-black selection:text-white dark:selection:bg-white dark:selection:text-black transition-colors duration-300 is-preload" onload="setModifiedDate(); setAccessedDate();">
{% include navbar.html %}
<main role="main" {% if page.layout == 'post' %}itemscope itemtype="https://schema.org/BlogPosting" {% else %} itemscope itemtype="https://schema.org/Blog" {% endif %} class="max-w-7xl mx-auto px-8">
    <header class="py-12 border-b-4 border-black dark:border-white">
        <div class="flex flex-col md:flex-row md:items-end justify-between gap-8">
            <div class="max-w-4xl">
                <h1 itemprop="headline" class="text-5xl md:text-[5vw] leading-[0.9] font-black uppercase tracking-tighter serif mt-8">
                    {{ page.title }}
                </h1>
            </div>
            {% if page.hijri %}
            <div class="text-left md:text-right pb-4">
                <p class="text-sm font-bold uppercase tracking-widest opacity-40">Published</p>
                <p class="text-xl font-black">{{ page.date | date: "%b %d, %Y" }} / {{ page.hijri }}</p>
            </div>
            {% endif %}
        </div>
    </header>
<section class="grid grid-cols-1 md:grid-cols-12 gap-12 py-24 items-start">
 {% include aside.html %}
<article class="md:col-span-8 md:col-start-5 max-w-none">
 {{ content }}
</article>
</section>
</main><!-- /main -->
{% include footer.html %}
{% include scripts.html %} 
</body>
</html>
