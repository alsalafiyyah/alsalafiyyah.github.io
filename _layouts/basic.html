layout: compress
---
<!DOCTYPE html>
<html 
 lang="{{ page.locale | default: 'en' }}" class="h-100" {% if page.locale == 'ar' %}dir="rtl"{% endif %}>
<head>
{% include metadata.html %}
</head>
<body role="document" itemscope itemtype="https://schema.org/WebPage" onload="setModifiedDate(); setAccessedDate();" 
 class="is-preload" class="d-flex flex-column h-100">
{% include Header2.html %}
<main role="main" style="margin-top: 110px !important;"><!-- main -->
 <div class="container-md">
 {{ content }}
 </div>
</main><!-- /main -->
{% include Footer.html %}
 <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/js/bootstrap.bundle.min.js" integrity="sha384-k6d4wzSIapyDyv1kpU366/PK5hCdSbCRGRCMv+eplOQJWyd1fbcAu9OCUj5zNLiq" crossorigin="anonymous"></script>
 <script>
  const urlParams = new URLSearchParams(window.location.search);
  let page = parseInt(urlParams.get("page")) || 1;
  const perPage = 10;
  let allProjects = [];

  const renderProjects = (projects) => {
    const totalPages = Math.ceil(projects.length / perPage);
    page = Math.min(page, totalPages) || 1;

    const start = (page - 1) * perPage;
    const end = start + perPage;
    const currentProjects = projects.slice(start, end);

    const list = document.getElementById('project-list');
    list.innerHTML = '';
    currentProjects.forEach(project => {
      const item = document.createElement('div');
      item.className = "col-md-6";
      item.innerHTML = `
        <div class="card h-100 shadow-none">
          <div class="card-body border-none bg-transparent">
            <h5 class="card-title">
              <a href="${project.url}" class="text-decoration-none">${project.title}</a>
            </h5>
            <p class="card-text">${project.description}</p>
          </div>
        </div>
      `;
      list.appendChild(item);
    });

    // Data Count
    document.getElementById('data-count').textContent = `${projects.length} entrie${projects.length !== 1 ? 's' : ''} found`;

    // Pagination
    const controls = document.getElementById('pagination-controls');
    controls.innerHTML = '';
    for (let i = 1; i <= totalPages; i++) {
      const li = document.createElement('li');
      li.className = `page-item ${i === page ? 'active' : ''}`;
      const link = document.createElement('a');
      link.className = 'page-link';
      link.href = `?page=${i}`;
      link.textContent = i;
      li.appendChild(link);
      controls.appendChild(li);
    }
  };

  const filterAndRender = () => {
    const query = document.getElementById('search-input').value.toLowerCase();
    const filtered = allProjects.filter(project =>
      project.title.toLowerCase().includes(query) ||
      project.description.toLowerCase().includes(query)
    );
    renderProjects(filtered);
  };

  fetch('https://alsalafiyyah.github.io/json/audios.json')
    .then(response => response.json())
    .then(projects => {
      allProjects = projects;
      filterAndRender();
    })
    .catch(error => {
      console.error("Failed to fetch projects.json:", error);
      document.getElementById('project-list').innerHTML = `
        <div class="alert alert-danger" role="alert">
          Failed to load data.
        </div>`;
    });

  document.getElementById('search-input').addEventListener('input', () => {
    page = 1; // reset to first page on new search
    filterAndRender();
  });
</script>
</body>
</html>
