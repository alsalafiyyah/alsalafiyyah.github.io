---
layout: basic
---
<div class="container my-5">
  <h1 class="mb-4">Audio Fatwas</h1>
  <!-- Search Bar -->
  <div class="mb-3">
    <input type="text" id="search-input" class="form-control shadow-none" placeholder="Search a fatwa...">
  </div>
  <!-- Data Count -->
  <p id="data-count" class="text-muted"></p>
  <!-- Project List -->
  <div id="project-list" class="row gy-4"></div>
  <!-- Pagination -->
  <nav>
    <ul id="pagination-controls" class="pagination justify-content-center mt-4"></ul>
  </nav>
</div>
<script>
  const urlParams = new URLSearchParams(window.location.search);
  let page = parseInt(urlParams.get("page")) || 1;
  const perPage = 10;
  let allProjects = [];

  const renderProjects = (projects) => {
    const totalPages = Math.ceil(projects.length / perPage);
    page = Math.min(page, totalPages) || 1;

    const start = (page - 1) * perPage;
    const end = start + perPage;
    const currentProjects = projects.slice(start, end);

    const list = document.getElementById('project-list');
    list.innerHTML = '';
    currentProjects.forEach(project => {
      const item = document.createElement('div');
      item.className = "col-md-6";
      item.innerHTML = `
        <div class="card h-100 shadow-none">
          <div class="card-body border-none bg-transparent">
            <h5 class="card-title">
              <a href="${project.url}" class="text-decoration-none">${project.title}</a>
            </h5>
            <p class="card-text">${project.description}</p>
          </div>
        </div>
      `;
      list.appendChild(item);
    });

    // Data Count
    document.getElementById('data-count').textContent = `${projects.length} entrie${projects.length !== 1 ? 's' : ''} found`;

    // Pagination
    const controls = document.getElementById('pagination-controls');
    controls.innerHTML = '';
    for (let i = 1; i <= totalPages; i++) {
      const li = document.createElement('li');
      li.className = `page-item ${i === page ? 'active' : ''}`;
      const link = document.createElement('a');
      link.className = 'page-link';
      link.href = `?page=${i}`;
      link.textContent = i;
      li.appendChild(link);
      controls.appendChild(li);
    }
  };

  const filterAndRender = () => {
    const query = document.getElementById('search-input').value.toLowerCase();
    const filtered = allProjects.filter(project =>
      project.title.toLowerCase().includes(query) ||
      project.description.toLowerCase().includes(query)
    );
    renderProjects(filtered);
  };

  fetch('https://alsalafiyyah.github.io/json/audios.json')
    .then(response => response.json())
    .then(projects => {
      allProjects = projects;
      filterAndRender();
    })
    .catch(error => {
      console.error("Failed to fetch projects.json:", error);
      document.getElementById('project-list').innerHTML = `
        <div class="alert alert-danger" role="alert">
          Failed to load data.
        </div>`;
    });

  document.getElementById('search-input').addEventListener('input', () => {
    page = 1; // reset to first page on new search
    filterAndRender();
  });
</script>
